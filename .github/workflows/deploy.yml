name: Deploy VAS Server (VM + Docker)

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/getbucks-vas-server
  CONTAINER_NAME: getbucks-vas-server
  BANKWARE_API_HOST: s-bwopenapi.getbucks.co.zw

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            ENV_FILE_PATH="${{ secrets.VM_ENV_PATH }}"
            if [ ! -f "$ENV_FILE_PATH" ]; then
              echo "VM_ENV_PATH does not exist on VM: $ENV_FILE_PATH"
              echo "Create this file on the VM and set GitHub secret VM_ENV_PATH to its absolute path."
              exit 1
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            BANKWARE_HOST_IP="${{ secrets.BANKWARE_HOST_IP }}"
            if [ -z "$BANKWARE_HOST_IP" ]; then
              BANKWARE_HOST_IP="10.10.10.3"
            fi

            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --env-file "$ENV_FILE_PATH" \
              --add-host ${{ env.BANKWARE_API_HOST }}:${BANKWARE_HOST_IP} \
              -p 3001:3001 \
              --restart unless-stopped \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

